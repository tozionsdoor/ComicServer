<svg viewBox="0 0 360 720" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <!-- phone frame -->
  <rect x="0" y="0" width="360" height="720" rx="28" fill="#11111b"/>
  <rect x="10" y="10" width="340" height="700" rx="20" fill="#000000"/>

  <!-- manga spread (two pages) -->
  <rect x="10" y="10" width="170" height="700" fill="#2a2a35"/>
  <rect x="180" y="10" width="170" height="700" fill="#33333f"/>
  <!-- abstract panels page 1 -->
  <g fill="#45475a" stroke="#585b70">
    <rect x="24" y="40" width="142" height="220"/>
    <rect x="24" y="270" width="68" height="180"/>
    <rect x="102" y="270" width="64" height="180"/>
    <rect x="24" y="460" width="142" height="200"/>
  </g>
  <!-- abstract panels page 2 -->
  <g fill="#3b3b48" stroke="#585b70">
    <rect x="194" y="40" width="142" height="160"/>
    <rect x="194" y="210" width="142" height="240"/>
    <rect x="194" y="460" width="68" height="200"/>
    <rect x="272" y="460" width="64" height="200"/>
  </g>

  <!-- top overlay -->
  <rect x="10" y="10" width="340" height="64" fill="#000000" fill-opacity="0.55"/>
  <g stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 26 L28 38 L40 50" transform="translate(-2,0)"/>
  </g>
  <text x="84" y="36" fill="#ffffff" font-size="13" font-weight="bold">巻数_第01巻.zip</text>
  <text x="84" y="56" fill="#cdd6f4" font-size="11">◀ 前の巻　|　次の巻 ▶</text>
  <rect x="240" y="22" width="44" height="26" rx="13" fill="#313244" fill-opacity="0.9"/>
  <text x="262" y="39" fill="#cdd6f4" font-size="11" text-anchor="middle">見開き</text>
  <rect x="290" y="22" width="50" height="26" rx="13" fill="#313244" fill-opacity="0.9"/>
  <text x="315" y="39" fill="#cdd6f4" font-size="11" text-anchor="middle">右綴じ</text>

  <!-- bottom overlay: filmstrip -->
  <rect x="10" y="586" width="340" height="124" fill="#000000" fill-opacity="0.55"/>
  <g>
    <!-- thumbnails -->
    <rect x="24" y="600" width="50" height="70" rx="3" fill="#45475a"/>
    <rect x="80" y="600" width="50" height="70" rx="3" fill="#45475a"/>
    <rect x="136" y="594" width="62" height="82" rx="3" fill="#89b4fa"/>
    <rect x="204" y="600" width="50" height="70" rx="3" fill="#45475a"/>
    <rect x="260" y="600" width="50" height="70" rx="3" fill="#45475a"/>
    <rect x="316" y="600" width="20" height="70" rx="3" fill="#45475a" opacity="0.4"/>
  </g>
  <text x="180" y="700" fill="#cdd6f4" font-size="12" text-anchor="middle">12 / 180</text>

  <!-- bottom home indicator -->
  <rect x="140" y="700" width="80" height="5" rx="2.5" fill="#45475a"/>
</svg>
